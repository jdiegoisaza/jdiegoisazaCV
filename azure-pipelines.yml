trigger:
  branches:
    include:
      - main

pool:
  name: "Default"

variables:
  - group: swa-secrets
  - name: NODE_VERSION
    value: "22.x"
  - name: GITLEAKS_VERSION
    value: "8.30.1"
  - name: SONAR_SCANNER_VERSION
    value: "8.0.1.6346"

stages:
  - stage: Security
    displayName: "Security"
    jobs:
      - job: Security
        displayName: "SAST/SCA/Secrets/SBOM"
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: $(NODE_VERSION)
            displayName: "Instalar Node.js"

          - script: npm ci
            displayName: "npm ci"

          - script: |
              curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v$(GITLEAKS_VERSION)/gitleaks_$(GITLEAKS_VERSION)_linux_x64.tar.gz" -o gitleaks.tar.gz
              tar -xzf gitleaks.tar.gz gitleaks
              ./gitleaks detect --source . --redact --exit-code 1
            displayName: "Gitleaks - detección de secretos"

          - script: npm audit --audit-level=high
            displayName: "npm audit - vulnerabilidades en dependencias (SCA)"

          - script: |
              curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b ./bin
              ./bin/trivy fs --scanners vuln --exit-code 1 --severity HIGH,CRITICAL --ignore-unfixed .
            displayName: "Trivy - escaneo de dependencias (SCA)"

          - script: |
              npx -y @cyclonedx/cyclonedx-npm --output-file $(Build.ArtifactStagingDirectory)/sbom.json
            displayName: "Generar SBOM (CycloneDX)"

          - publish: $(Build.ArtifactStagingDirectory)/sbom.json
            artifact: sbom
            displayName: "Publicar SBOM"

          - script: |
              python3 -m venv "$(Agent.TempDirectory)/checkov-venv"
              "$(Agent.TempDirectory)/checkov-venv/bin/pip" install --quiet --upgrade pip
              "$(Agent.TempDirectory)/checkov-venv/bin/pip" install --quiet checkov
              "$(Agent.TempDirectory)/checkov-venv/bin/checkov" -d infra --framework terraform --compact --soft-fail
            displayName: "Checkov - escaneo de IaC (Terraform)"

          - script: |
              curl -sSfL "https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-$(SONAR_SCANNER_VERSION)-linux-x64.zip" -o sonar-scanner.zip
              unzip -q -o sonar-scanner.zip
              ./sonar-scanner-$(SONAR_SCANNER_VERSION)-linux-x64/bin/sonar-scanner -Dsonar.token=$(SONAR_TOKEN)
            displayName: "SonarCloud - análisis SAST"

  - stage: Build
    displayName: "Build"
    dependsOn: Security
    condition: succeeded()
    jobs:
      - job: Build
        displayName: "Compilar sitio Next.js (export estático)"
        steps:
          - script: |
              docker run --rm -v "$(System.DefaultWorkingDirectory)/cv:/data" -w /data texlive/texlive:latest bash -c "
                mkdir -p ~/.fonts &&
                cp fonts/*.ttf ~/.fonts/ &&
                fc-cache -f &&
                xelatex -interaction=nonstopmode -halt-on-error resume.tex &&
                xelatex -interaction=nonstopmode -halt-on-error resume.tex
              "
            displayName: "Compilar CV (Docker + TeX Live)"

          - script: |
              mkdir -p public
              cp cv/resume.pdf public/CV_JuanIsaza.pdf
            displayName: "Copiar CV compilado a public/"

          - task: NodeTool@0
            inputs:
              versionSpec: $(NODE_VERSION)
            displayName: "Instalar Node.js"

          - script: |
              npm ci
              npm run build
            displayName: "npm ci && npm run build"

          - publish: out
            artifact: site
            displayName: "Publicar artefacto (out/)"

  - stage: Deploy
    displayName: "Deploy"
    dependsOn: Build
    condition: succeeded()
    jobs:
      - deployment: DeployStaticWebApp
        displayName: "Desplegar a Azure Static Web Apps"
        environment: "production"
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: site
                  displayName: "Descargar artefacto 'site'"

                - task: NodeTool@0
                  inputs:
                    versionSpec: $(NODE_VERSION)
                  displayName: "Instalar Node.js"

                - script: |
                    npx -y @azure/static-web-apps-cli deploy "$(Pipeline.Workspace)/site" --deployment-token $(AZURE_STATIC_WEB_APPS_API_TOKEN) --env production
                  displayName: "Desplegar con SWA CLI"
